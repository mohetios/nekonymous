# pnpm project settings (required even for single-package repos on pnpm 10+)
packages:
  - "."

onlyBuiltDependencies:
  - esbuild
  - workerd

minimumReleaseAgeExclude:
  - '@cloudflare/workerd-*'
  - '@cloudflare/workers-types'
  - '@types/node'
  - miniflare
  - workerd
  - wrangler

allowBuilds:
  esbuild: true
  sharp: true
  workerd: true
